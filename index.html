<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Detailer Lucas Moraes</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>DETAILER LUCAS MORAES</h1>

<!-- LOGIN -->
<div id="login">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="showCadastro()">Criar Conta</button>
</div>

<!-- CADASTRO -->
<div id="cadastro" class="hidden">
<input id="email_cad" placeholder="Email">
<input id="senha_cad" type="password" placeholder="Senha">

<button onclick="cadastrar()">Cadastrar</button>
<button onclick="showLogin()">Voltar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<p class="desc">
Excelência em cuidado automotivo: acabamento padrão concessionária, polimento e vitrificação com agendamento exclusivo.
</p>

<input id="nome" placeholder="Seu nome">

<select id="servico">
<option>Polimento</option>
<option>Vitrificação</option>
<option>Lavagem Completa</option>
</select>

<select id="horario">
<option>08:00</option>
<option>09:00</option>
<option>10:00</option>
<option>11:00</option>
<option>13:00</option>
<option>14:00</option>
<option>15:00</option>
<option>16:00</option>
</select>

<button onclick="agendar()">Agendar</button>
<button onclick="logout()">Sair</button>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
